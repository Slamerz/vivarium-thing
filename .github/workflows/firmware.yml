name: Build Arduino Firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install AVR build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            avr-libc \
            gcc-avr \
            pkg-config \
            libudev-dev \
            build-essential

      - name: Build release firmware
        run: cargo build --release --locked --target avr-none --bin vivarium

      - name: Package firmware
        run: |
          set -euo pipefail

          ELF="target/avr-none/release/vivarium.elf"

          if [ ! -f "$ELF" ]; then
            echo "Expected firmware ELF was not found: $ELF"
            find target -type f | sort
            exit 1
          fi

          mkdir -p dist

          avr-objcopy \
            -O ihex \
            -R .eeprom \
            "$ELF" \
            dist/vivarium-uno.hex

          cp "$ELF" dist/vivarium-uno.elf

          avr-size \
            --mcu=atmega328p \
            --format=avr \
            "$ELF"

          sha256sum dist/vivarium-uno.hex > dist/vivarium-uno.hex.sha256
            dist/vivarium.elf \
            dist/vivarium.hex.sha256 \
            --verify-tag \
            --generate-notes
