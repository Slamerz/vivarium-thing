name: Build Arduino Firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install AVR build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            avr-libc \
            gcc-avr \
            pkg-config \
            libudev-dev \
            build-essential

      - name: Build release firmware
        run: cargo build --release --locked --target avr-none --bin vivarium

      - name: Package firmware
        shell: bash
        run: |
          set -euo pipefail

          ELF="target/avr-none/release/vivarium.elf"
          test -f "$ELF"

          mkdir -p dist

          avr-objcopy -O ihex -R .eeprom "$ELF" "dist/vivarium-uno.hex"
          install -m 0644 "$ELF" "dist/vivarium-uno.elf"

          avr-size --mcu=atmega328p --format=avr "$ELF"
          sha256sum "dist/vivarium-uno.hex" > "dist/vivarium-uno.hex.sha256"

          ls -lah dist

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: vivarium-uno-firmware
          path: dist/
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download firmware artifact
        uses: actions/download-artifact@v5
        with:
          name: vivarium-uno-firmware
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/vivarium-uno.hex \
            dist/vivarium-uno.elf \
            dist/vivarium-uno.hex.sha256 \
            --verify-tag \
            --generate-notes
