name: Build Arduino Firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install AVR build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            avr-libc \
            gcc-avr \
            pkg-config \
            libudev-dev \
            build-essential

      - name: Build release firmware
        run: cargo build --release --locked

      - name: Package firmware
        run: |
          mkdir -p dist

          avr-objcopy \
            -O ihex \
            -R .eeprom \
            target/avr-none/release/vivarium \
            dist/vivarium.hex

          cp target/avr-none/release/vivarium dist/vivarium.elf

          avr-size \
            --mcu=atmega328p \
            --format=avr \
            target/avr-none/release/vivarium

          sha256sum dist/vivarium.hex > dist/vivarium.hex.sha256

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: vivarium-firmware
          path: dist/
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v5
        with:
          name: vivarium-firmware
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/vivarium.hex \
            dist/vivarium.elf \
            dist/vivarium.hex.sha256 \
            --verify-tag \
            --generate-notes
